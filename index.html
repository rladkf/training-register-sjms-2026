<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>상정중 교직원 연수 전자 등록부</title>
<style>
  /* 화면 흔들림 방지를 위한 극단적 고정 스타일 */
  body, html {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow-x: hidden;
    overscroll-behavior: none; /* 브라우저 바운스 효과 제거 */
    touch-action: manipulation;
  }
  
  /* 모달창 고정 */
  .overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); z-index: 9999;
    display: none; touch-action: none;
  }
  .modal {
    position: fixed; bottom: 0; left: 0; width: 100%; background: #fff;
    border-radius: 20px 20px 0 0; padding: 20px;
    touch-action: none; /* 모달 내부 스크롤 시도 무시 */
  }
  
  /* 서명 패드 강제 고정 */
  #pad {
    width: 100%; height: 200px; border: 2px dashed #ccc;
    display: block; touch-action: none; /* 핵심: 브라우저 제스처 차단 */
    -webkit-user-select: none; user-select: none;
  }
</style>
</head>
<body>

<div class="wrap">
  <!-- (기존 본문 내용은 동일) -->
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <canvas id="pad"></canvas>
    <button id="saveBtn">저장</button>
  </div>
</div>

<script>
  const canvas = document.getElementById('pad');
  const ctx = canvas.getContext('2d');
  let drawing = false;

  // 브라우저의 기본 터치 행동(스크롤/흔들림)을 완벽 차단
  function preventDefault(e) { e.preventDefault(); }

  canvas.addEventListener('touchstart', (e) => {
    drawing = true;
    e.preventDefault(); // 스크롤 차단
    const rect = canvas.getBoundingClientRect();
    ctx.beginPath();
    ctx.moveTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    if(!drawing) return;
    e.preventDefault(); // 화면 흔들림 방지
    const rect = canvas.getBoundingClientRect();
    ctx.lineTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
    ctx.stroke();
  }, { passive: false });

  canvas.addEventListener('touchend', () => { drawing = false; });

  // 마우스 대응
  canvas.addEventListener('mousedown', (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
  canvas.addEventListener('mousemove', (e) => { if(drawing) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } });
  canvas.addEventListener('mouseup', () => { drawing = false; });
</script>
</body>
</html>
